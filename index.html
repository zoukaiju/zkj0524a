<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四城天气查询</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #4a90e2;
            --blue-light: #e3f2fd;
            --orange: #ff9800;
            --green: #4caf50;
            --purple: #9c27b0;
            --bg: #f5f7fa;
            --surface: #ffffff;
            --text: #2d3748;
            --text-secondary: #718096;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 2rem;
            font-weight: 500;
        }
        .query-box {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5); }
        .btn:active { transform: translateY(-1px); }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }
        .weather-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.75rem 1.5rem;
            box-shadow: var(--shadow);
            text-align: center;
            transition: 0.3s;
            border-top: 4px solid;
            position: relative;
            overflow: hidden;
        }
        .weather-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.5));
            opacity: 0;
            transition: 0.3s;
        }
        .weather-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
        .weather-card:hover::before { opacity: 1; }
        .weather-card.beijing { border-top-color: #e74c3c; }
        .weather-card.shanghai { border-top-color: #3498db; }
        .weather-card.sanya { border-top-color: #f39c12; }
        .weather-card.harbin { border-top-color: #9b59b6; }

        .city-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }
        .weather-icon {
            font-size: 3.5rem;
            margin: 0.5rem 0;
            position: relative;
            z-index: 1;
        }
        .temperature {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
            margin: 0.5rem 0;
            position: relative;
            z-index: 1;
        }
        .weather-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }
        .weather-details {
            display: flex;
            justify-content: space-around;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            font-size: 0.8rem;
            position: relative;
            z-index: 1;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .detail-label {
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.2rem;
        }
        .detail-value {
            color: var(--text);
            font-weight: 700;
        }

        .update-time {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1rem;
            box-shadow: var(--shadow);
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }
        .error-msg {
            background: #fff5f5;
            color: #c53030;
            padding: 1.25rem;
            border-radius: var(--radius);
            text-align: center;
            font-weight: 600;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        @media (max-width: 600px) {
            .weather-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌤️ 四城天气查询</h1>
    <p class="subtitle">北京 · 上海 · 三亚 · 哈尔滨</p>

    <div class="query-box">
        <button class="btn" onclick="queryWeather()">🔄 查询当天天气</button>
    </div>

    <div id="error-container"></div>
    <div id="weather-container"></div>
    <div id="update-time"></div>
</div>

<script>
const cities = [
    { name: '北京', nameEn: 'Beijing', class: 'beijing', emoji: '🏛️' },
    { name: '上海', nameEn: 'Shanghai', class: 'shanghai', emoji: '🏙️' },
    { name: '三亚', nameEn: 'Sanya', class: 'sanya', emoji: '🏖️' },
    { name: '哈尔滨', nameEn: 'Harbin', class: 'harbin', emoji: '❄️' }
];

const weatherIcons = {
    '113': '☀️', '116': '⛅', '119': '☁️', '122': '☁️', '143': '🌫️',
    '176': '🌦️', '179': '🌨️', '182': '🌨️', '185': '🌨️', '200': '⛈️',
    '227': '🌨️', '230': '❄️', '248': '🌫️', '260': '🌫️', '263': '🌦️',
    '266': '🌧️', '281': '🌧️', '284': '🌧️', '293': '🌦️', '296': '🌧️',
    '299': '🌧️', '302': '🌧️', '305': '🌧️', '308': '🌧️', '311': '🌧️',
    '314': '🌧️', '317': '🌧️', '320': '🌨️', '323': '🌨️', '326': '🌨️',
    '329': '❄️', '332': '❄️', '335': '❄️', '338': '❄️', '350': '🌨️',
    '353': '🌦️', '356': '🌧️', '359': '🌧️', '362': '🌨️', '365': '🌨️',
    '368': '🌨️', '371': '❄️', '374': '🌨️', '377': '🌨️', '386': '⛈️',
    '389': '⛈️', '392': '⛈️', '395': '❄️'
};

const weatherDescCN = {
    'Sunny': '晴朗', 'Clear': '晴朗', 'Partly cloudy': '多云', 'Cloudy': '阴天',
    'Overcast': '阴天', 'Mist': '薄雾', 'Fog': '雾', 'Patchy rain possible': '可能有雨',
    'Light rain': '小雨', 'Moderate rain': '中雨', 'Heavy rain': '大雨',
    'Patchy snow possible': '可能有雪', 'Light snow': '小雪', 'Moderate snow': '中雪',
    'Heavy snow': '大雪', 'Thundery outbreaks possible': '可能有雷暴'
};

function showError(msg) {
    document.getElementById('error-container').innerHTML = msg ? `<div class="error-msg">${msg}</div>` : '';
}

function showLoading() {
    document.getElementById('weather-container').innerHTML = '<div class="loading">正在获取天气数据</div>';
    document.getElementById('update-time').innerHTML = '';
}

async function fetchCityWeather(cityEn) {
    const res = await fetch(`https://wttr.in/${cityEn}?format=j1`);
    return await res.json();
}

function getWeatherIcon(code) {
    return weatherIcons[code] || '🌤️';
}

function getWeatherDescCN(desc) {
    return weatherDescCN[desc] || desc;
}

function renderWeather(weatherData) {
    const html = cities.map((city, idx) => {
        const data = weatherData[idx];
        if (!data || !data.current_condition || !data.current_condition[0]) {
            return `<div class="weather-card ${city.class}">
                <div class="city-name">${city.emoji} ${city.name}</div>
                <div style="padding:2rem;color:var(--text-secondary)">数据获取失败</div>
            </div>`;
        }

        const current = data.current_condition[0];
        const temp = current.temp_C;
        const feelsLike = current.FeelsLikeC;
        const weatherCode = current.weatherCode;
        const weatherDesc = current.weatherDesc[0].value;
        const humidity = current.humidity;
        const windSpeed = current.windspeedKmph;

        return `
            <div class="weather-card ${city.class}">
                <div class="city-name">${city.emoji} ${city.name}</div>
                <div class="weather-icon">${getWeatherIcon(weatherCode)}</div>
                <div class="temperature">${temp}°C</div>
                <div class="weather-desc">${getWeatherDescCN(weatherDesc)}</div>
                <div class="weather-details">
                    <div class="detail-item">
                        <div class="detail-label">体感</div>
                        <div class="detail-value">${feelsLike}°C</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">湿度</div>
                        <div class="detail-value">${humidity}%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">风速</div>
                        <div class="detail-value">${windSpeed}km/h</div>
                    </div>
                </div>
            </div>`;
    }).join('');

    document.getElementById('weather-container').innerHTML = `<div class="weather-grid">${html}</div>`;

    const now = new Date();
    const timeStr = now.toLocaleString('zh-CN', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
    });
    document.getElementById('update-time').innerHTML =
        `<div class="update-time">📅 更新时间：${timeStr} | 数据来源：wttr.in</div>`;
}

async function queryWeather() {
    showError('');
    showLoading();

    try {
        const promises = cities.map(city => fetchCityWeather(city.nameEn));
        const results = await Promise.all(promises);
        renderWeather(results);
    } catch (e) {
        showError('获取天气数据失败，请检查网络连接后重试');
        document.getElementById('weather-container').innerHTML = '';
        document.getElementById('update-time').innerHTML = '';
    }
}

// 页面加载时自动查询
queryWeather();
</script>
</body>
</html>
