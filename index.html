<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四城天气查询</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #4a90e2;
            --blue-light: #e3f2fd;
            --orange: #ff9800;
            --green: #4caf50;
            --purple: #9c27b0;
            --bg: #f5f7fa;
            --surface: #ffffff;
            --text: #2d3748;
            --text-secondary: #718096;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 2rem;
            font-weight: 500;
        }
        .query-box {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5); }
        .btn:active { transform: translateY(-1px); }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }
        .weather-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.75rem 1.5rem;
            box-shadow: var(--shadow);
            text-align: center;
            transition: 0.3s;
            border-top: 4px solid;
            position: relative;
            overflow: hidden;
        }
        .weather-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.5));
            opacity: 0;
            transition: 0.3s;
        }
        .weather-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
        .weather-card:hover::before { opacity: 1; }
        .weather-card.beijing { border-top-color: #e74c3c; }
        .weather-card.shanghai { border-top-color: #3498db; }
        .weather-card.sanya { border-top-color: #f39c12; }
        .weather-card.harbin { border-top-color: #9b59b6; }

        .city-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }
        .weather-icon {
            font-size: 3.5rem;
            margin: 0.5rem 0;
            position: relative;
            z-index: 1;
        }
        .temperature {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text);
            margin: 0.5rem 0;
            position: relative;
            z-index: 1;
        }
        .weather-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 1;
        }
        .weather-details {
            display: flex;
            justify-content: space-around;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            font-size: 0.8rem;
            position: relative;
            z-index: 1;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .detail-label {
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.2rem;
        }
        .detail-value {
            color: var(--text);
            font-weight: 700;
        }

        .update-time {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1rem;
            box-shadow: var(--shadow);
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }
        .error-msg {
            background: #fff5f5;
            color: #c53030;
            padding: 1.25rem;
            border-radius: var(--radius);
            text-align: center;
            font-weight: 600;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        @media (max-width: 600px) {
            .weather-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }

        /* AI 客服按钮 */
        .ai-service-btn {
            position: fixed;
            bottom: 50%;
            right: 2rem;
            transform: translateY(50%);
            width: 140px;
            padding: 1.5rem 1rem;
            background: linear-gradient(135deg, #ff4757, #e84118);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(255, 71, 87, 0.4);
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            z-index: 999;
        }
        .ai-service-btn:hover {
            transform: translateY(50%) scale(1.1);
            box-shadow: 0 12px 40px rgba(255, 71, 87, 0.6);
        }
        .ai-icon {
            font-size: 3rem;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .ai-text {
            color: white;
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            line-height: 1.3;
        }
        @media (max-width: 600px) {
            .ai-service-btn {
                right: 1rem;
                width: 100px;
                padding: 1rem 0.75rem;
            }
            .ai-icon { font-size: 2.5rem; }
            .ai-text { font-size: 0.85rem; }
        }

        /* AI 对话框 */
        .chat-panel {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 400px;
            height: 550px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            animation: chatSlideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .chat-panel.open { display: flex; }
        @keyframes chatSlideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .chat-header {
            background: linear-gradient(135deg, #ff4757, #e84118);
            color: white;
            padding: 1rem 1.25rem;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.9;
            transition: 0.2s;
            line-height: 1;
        }
        .chat-close:hover { opacity: 1; transform: scale(1.2); }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: #f8f9ff;
        }
        .chat-msg {
            display: flex;
            max-width: 85%;
        }
        .chat-msg.bot { align-self: flex-start; }
        .chat-msg.user { align-self: flex-end; }
        .chat-bubble {
            padding: 0.75rem 1rem;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.6;
            font-weight: 500;
            word-break: break-word;
        }
        .chat-msg.bot .chat-bubble {
            background: white;
            color: #2d3748;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        .chat-msg.user .chat-bubble {
            background: linear-gradient(135deg, #ff4757, #e84118);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .chat-msg.bot.loading .chat-bubble::after {
            content: '●●●';
            animation: typingDots 1s infinite;
            letter-spacing: 2px;
        }
        @keyframes typingDots {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .chat-input-bar {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem;
            border-top: 1px solid #e2e8f0;
            background: white;
        }
        .chat-input {
            flex: 1;
            padding: 0.7rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
        }
        .chat-input:focus { border-color: #ff4757; }
        .chat-send {
            padding: 0.7rem 1.2rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff4757, #e84118);
            color: white;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .chat-send:hover { transform: scale(1.05); }
        @media (max-width: 600px) {
            .chat-panel {
                width: calc(100vw - 2rem);
                height: calc(100vh - 6rem);
                bottom: 1rem;
                right: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌤️ 四城天气查询</h1>
    <p class="subtitle">北京 · 上海 · 三亚 · 哈尔滨</p>

    <div class="query-box">
        <button class="btn" onclick="queryWeather()">🔄 查询当天天气</button>
    </div>

    <div id="error-container"></div>
    <div id="weather-container"></div>
    <div id="update-time"></div>

    <!-- AI 客服按钮 -->
    <div class="ai-service-btn" onclick="toggleChat()">
        <div class="ai-icon">🤖</div>
        <div class="ai-text">AI 智能客服</div>
    </div>

    <!-- AI 对话框 -->
    <div class="chat-panel" id="chat-panel">
        <div class="chat-header">
            <span>🤖 AI 智能客服</span>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="chat-msg bot">
                <div class="chat-bubble">你好！我是天气查询助手，有什么可以帮你的？😊</div>
            </div>
        </div>
        <div class="chat-input-bar">
            <input type="text" class="chat-input" id="chat-input" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendMsg()">
            <button class="chat-send" onclick="sendMsg()">发送</button>
        </div>
    </div>
</div>

<script>
const cities = [
    { name: '北京', nameEn: 'Beijing', class: 'beijing', emoji: '🏛️' },
    { name: '上海', nameEn: 'Shanghai', class: 'shanghai', emoji: '🏙️' },
    { name: '三亚', nameEn: 'Sanya', class: 'sanya', emoji: '🏖️' },
    { name: '哈尔滨', nameEn: 'Harbin', class: 'harbin', emoji: '❄️' }
];

const weatherIcons = {
    '113': '☀️', '116': '⛅', '119': '☁️', '122': '☁️', '143': '🌫️',
    '176': '🌦️', '179': '🌨️', '182': '🌨️', '185': '🌨️', '200': '⛈️',
    '227': '🌨️', '230': '❄️', '248': '🌫️', '260': '🌫️', '263': '🌦️',
    '266': '🌧️', '281': '🌧️', '284': '🌧️', '293': '🌦️', '296': '🌧️',
    '299': '🌧️', '302': '🌧️', '305': '🌧️', '308': '🌧️', '311': '🌧️',
    '314': '🌧️', '317': '🌧️', '320': '🌨️', '323': '🌨️', '326': '🌨️',
    '329': '❄️', '332': '❄️', '335': '❄️', '338': '❄️', '350': '🌨️',
    '353': '🌦️', '356': '🌧️', '359': '🌧️', '362': '🌨️', '365': '🌨️',
    '368': '🌨️', '371': '❄️', '374': '🌨️', '377': '🌨️', '386': '⛈️',
    '389': '⛈️', '392': '⛈️', '395': '❄️'
};

const weatherDescCN = {
    'Sunny': '晴朗', 'Clear': '晴朗', 'Partly cloudy': '多云', 'Cloudy': '阴天',
    'Overcast': '阴天', 'Mist': '薄雾', 'Fog': '雾', 'Patchy rain possible': '可能有雨',
    'Light rain': '小雨', 'Moderate rain': '中雨', 'Heavy rain': '大雨',
    'Patchy snow possible': '可能有雪', 'Light snow': '小雪', 'Moderate snow': '中雪',
    'Heavy snow': '大雪', 'Thundery outbreaks possible': '可能有雷暴'
};

function showError(msg) {
    document.getElementById('error-container').innerHTML = msg ? `<div class="error-msg">${msg}</div>` : '';
}

function showLoading() {
    document.getElementById('weather-container').innerHTML = '<div class="loading">正在获取天气数据</div>';
    document.getElementById('update-time').innerHTML = '';
}

async function fetchCityWeather(cityEn) {
    const res = await fetch(`https://wttr.in/${cityEn}?format=j1`);
    return await res.json();
}

function getWeatherIcon(code) {
    return weatherIcons[code] || '🌤️';
}

function getWeatherDescCN(desc) {
    return weatherDescCN[desc] || desc;
}

function renderWeather(weatherData) {
    const html = cities.map((city, idx) => {
        const data = weatherData[idx];
        if (!data || !data.current_condition || !data.current_condition[0]) {
            return `<div class="weather-card ${city.class}">
                <div class="city-name">${city.emoji} ${city.name}</div>
                <div style="padding:2rem;color:var(--text-secondary)">数据获取失败</div>
            </div>`;
        }

        const current = data.current_condition[0];
        const temp = current.temp_C;
        const feelsLike = current.FeelsLikeC;
        const weatherCode = current.weatherCode;
        const weatherDesc = current.weatherDesc[0].value;
        const humidity = current.humidity;
        const windSpeed = current.windspeedKmph;

        return `
            <div class="weather-card ${city.class}">
                <div class="city-name">${city.emoji} ${city.name}</div>
                <div class="weather-icon">${getWeatherIcon(weatherCode)}</div>
                <div class="temperature">${temp}°C</div>
                <div class="weather-desc">${getWeatherDescCN(weatherDesc)}</div>
                <div class="weather-details">
                    <div class="detail-item">
                        <div class="detail-label">体感</div>
                        <div class="detail-value">${feelsLike}°C</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">湿度</div>
                        <div class="detail-value">${humidity}%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">风速</div>
                        <div class="detail-value">${windSpeed}km/h</div>
                    </div>
                </div>
            </div>`;
    }).join('');

    document.getElementById('weather-container').innerHTML = `<div class="weather-grid">${html}</div>`;

    const now = new Date();
    const timeStr = now.toLocaleString('zh-CN', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
    });
    document.getElementById('update-time').innerHTML =
        `<div class="update-time">📅 更新时间：${timeStr} | 数据来源：wttr.in</div>`;
}

async function queryWeather() {
    showError('');
    showLoading();

    try {
        const promises = cities.map(city => fetchCityWeather(city.nameEn));
        const results = await Promise.all(promises);
        renderWeather(results);
    } catch (e) {
        showError('获取天气数据失败，请检查网络连接后重试');
        document.getElementById('weather-container').innerHTML = '';
        document.getElementById('update-time').innerHTML = '';
    }
}

// 页面加载时自动查询
queryWeather();

// ===== AI 客服功能 =====
const API_URL = 'https://vtok.ai/v1/chat/completions';
const API_KEY = 'sk-WtuYv9jrDYMKqDin01fsEGfyPPzqVWvBOAtft1bQHXLcJFpC';
const MODEL = 'deepseek-v3.2';

const SYSTEM_PROMPT = `你是"四城天气查询"网站的AI客服助手。请用简短友好的中文回复用户问题。

这个网站的功能：
1. 查询北京、上海、三亚、哈尔滨四个城市的当天天气
2. 显示温度、体感温度、天气状况、湿度、风速等信息
3. 数据来源于 wttr.in 免费天气服务

使用说明：
- 点击"查询当天天气"按钮获取最新天气数据
- 页面会自动显示四个城市的天气卡片
- 数据每次查询时实时更新

请简洁回答，每次不超过3句话。语气活泼友好。`;

let chatHistory = [{ role: 'system', content: SYSTEM_PROMPT }];

function toggleChat() {
    const panel = document.getElementById('chat-panel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
        document.getElementById('chat-input').focus();
    }
}

function appendMsg(role, text) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `chat-msg ${role}`;
    const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    div.innerHTML = `<div class="chat-bubble">${escaped}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function appendLoading() {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'chat-msg bot loading';
    div.id = 'chat-loading';
    div.innerHTML = '<div class="chat-bubble"></div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function removeLoading() {
    const el = document.getElementById('chat-loading');
    if (el) el.remove();
}

async function sendMsg() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    appendMsg('user', text);
    chatHistory.push({ role: 'user', content: text });
    appendLoading();

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                model: MODEL,
                messages: chatHistory,
                max_tokens: 300,
                temperature: 0.7
            })
        });

        const data = await res.json();
        removeLoading();

        if (data.choices && data.choices[0]) {
            const reply = data.choices[0].message.content;
            chatHistory.push({ role: 'assistant', content: reply });
            appendMsg('bot', reply);
        } else {
            appendMsg('bot', '抱歉，我暂时无法回复，请稍后再试。');
        }
    } catch (e) {
        removeLoading();
        appendMsg('bot', '网络连接失败，请检查网络后重试。');
    }
}
</script>
</body>
</html>
